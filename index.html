<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordQuiz — 英単語クイズ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --card: #22222d;
      --border: #2e2e3e;
      --accent: #f5c842;
      --accent2: #e87040;
      --text: #f0ede8;
      --muted: #7a7a90;
      --correct: #4caf7d;
      --wrong: #e05555;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 560px; }

    header { text-align: center; margin-bottom: 40px; }
    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      letter-spacing: -1px;
      color: var(--accent);
    }
    header .logo span { color: var(--accent2); }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

    .progress-wrap { margin-bottom: 24px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px; transition: width 0.5s ease;
    }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 32px 32px;
      margin-bottom: 20px;
      animation: slideIn 0.35s cubic-bezier(.22,1,.36,1);
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .question-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }
    .question-word {
      font-family: 'Playfair Display', serif;
      font-size: 3rem; color: var(--text);
      line-height: 1.1; margin-bottom: 12px;
    }
    .question-hint { font-size: 0.85rem; color: var(--muted); }

    .input-wrap { margin-bottom: 12px; }
    .answer-input {
      width: 100%;
      padding: 18px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .answer-input::placeholder { color: var(--muted); }
    .answer-input:focus { border-color: var(--accent); }
    .answer-input.correct { border-color: var(--correct); background: #1a3029; color: var(--correct); }
    .answer-input.wrong   { border-color: var(--wrong);   background: #2e1a1a; color: var(--wrong); }

    .hint-toggle {
      background: none; border: none; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      cursor: pointer; padding: 0; margin-bottom: 14px;
      text-decoration: underline; display: block;
    }
    .hint-toggle:hover { color: var(--text); }
    .first-char-hint {
      font-size: 0.85rem; color: var(--accent);
      margin-bottom: 14px; display: none;
    }
    .first-char-hint.show { display: block; }

    .btn-answer {
      width: 100%; padding: 18px; border-radius: var(--radius);
      background: var(--accent); color: #0f0f13;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      border: none; cursor: pointer; margin-bottom: 16px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-answer:hover { background: #f7d060; transform: translateY(-2px); }
    .btn-answer:disabled { opacity: 0.4; cursor: default; transform: none; }

    .feedback {
      border-radius: var(--radius); padding: 16px 20px;
      font-size: 0.9rem; margin-bottom: 20px;
      display: none; animation: slideIn 0.25s ease;
    }
    .feedback.show { display: block; }
    .feedback.correct-fb { background: #1a3029; border: 1px solid var(--correct); color: var(--correct); }
    .feedback.wrong-fb  { background: #2e1a1a; border: 1px solid var(--wrong);  color: var(--wrong); }
    .feedback strong { display: block; margin-bottom: 4px; font-size: 1rem; }
    .feedback span { color: var(--muted); font-size: 0.85rem; }

    .btn-next {
      width: 100%; padding: 18px; border-radius: var(--radius);
      background: var(--accent); color: #0f0f13;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      border: none; cursor: pointer; display: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-next.show { display: block; animation: slideIn 0.25s ease; }
    .btn-next:hover { background: #f7d060; transform: translateY(-2px); }

    #result-screen { display: none; text-align: center; animation: slideIn 0.4s cubic-bezier(.22,1,.36,1); }
    #result-screen.show { display: block; }
    .result-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 48px 32px;
    }
    .result-emoji { font-size: 4rem; margin-bottom: 16px; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 8px; }
    .result-score { font-size: 4rem; font-weight: 600; color: var(--accent); line-height: 1; }
    .result-total { font-size: 1rem; color: var(--muted); margin-bottom: 32px; }
    .result-msg { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; }
    .btn-retry {
      padding: 16px 40px; border-radius: var(--radius);
      background: var(--accent2); color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-retry:hover { background: #f08050; transform: translateY(-2px); }

    #quiz-screen { display: none; }
    #quiz-screen.show { display: block; }
    #start-screen { display: block; }
    #start-screen.hide { display: none; }

    .start-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 32px; text-align: center;
    }
    .start-card h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 12px; }
    .start-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .level-btn {
      background: var(--surface); border: 1.5px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500; padding: 16px;
      border-radius: 12px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .level-btn:hover, .level-btn.selected { border-color: var(--accent); background: #2a2a36; }
    .level-btn .lv-tag {
      display: block; font-size: 0.7rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    .btn-start {
      width: 100%; padding: 18px; border-radius: var(--radius);
      background: var(--accent); color: #0f0f13;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-start:hover { background: #f7d060; transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">Word<span>Quiz</span></div>
    <p>英単語を楽しく覚えよう</p>
  </header>

  <!-- START -->
  <div id="start-screen">
    <div class="start-card">
      <h2>レベルを選んでスタート</h2>
      <p>英単語の日本語訳を入力するクイズです。<br>Enterキーでも回答・次の問題に進めます。</p>
      <div class="level-grid">
        <button class="level-btn selected" data-level="basic" onclick="selectLevel(this)">
          <span class="lv-tag">Level 1</span>基礎 (CEFR A1)
        </button>
        <button class="level-btn" data-level="elementary" onclick="selectLevel(this)">
          <span class="lv-tag">Level 2</span>初級 (CEFR A2)
        </button>
        <button class="level-btn" data-level="intermediate" onclick="selectLevel(this)">
          <span class="lv-tag">Level 3</span>中級 (CEFR B1)
        </button>
        <button class="level-btn" data-level="advanced" onclick="selectLevel(this)">
          <span class="lv-tag">Level 4</span>上級 (CEFR B2)
        </button>
      </div>
      <button class="btn-start" onclick="startQuiz()">クイズをはじめる →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="q-counter">問題 1 / 10</span>
        <span id="score-info">正解 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div class="card" id="question-card">
      <div class="question-label">日本語訳を入力してください</div>
      <div class="question-word" id="q-word">apple</div>
      <div class="question-hint" id="q-hint">品詞: 名詞</div>
    </div>

    <div class="input-wrap">
      <input type="text" class="answer-input" id="answer-input"
        placeholder="日本語で入力…" autocomplete="off"
        onkeydown="handleKey(event)" />
    </div>

    <button class="hint-toggle" onclick="showHint()">💡 ヒントを見る</button>
    <div class="first-char-hint" id="first-char-hint"></div>

    <button class="btn-answer" id="btn-answer" onclick="checkAnswer()">答え合わせ →</button>

    <div class="feedback" id="feedback">
      <strong id="fb-title"></strong>
      <span id="fb-detail"></span>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <!-- RESULT -->
  <div id="result-screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title">クイズ完了！</div>
      <div class="result-score" id="result-score">8</div>
      <div class="result-total" id="result-total">/ 10 問正解</div>
      <div class="result-msg" id="result-msg">素晴らしい！</div>
      <button class="btn-retry" onclick="retryQuiz()">もう一度チャレンジ</button>
    </div>
  </div>

</div>
<script>
const wordBanks = {
  basic: [
    { word:"apple",   pos:"名詞",   meanings:["りんご","リンゴ"] },
    { word:"dog",     pos:"名詞",   meanings:["犬","いぬ"] },
    { word:"happy",   pos:"形容詞", meanings:["幸せ","幸せな","うれしい","嬉しい"] },
    { word:"run",     pos:"動詞",   meanings:["走る","はしる"] },
    { word:"big",     pos:"形容詞", meanings:["大きい","おおきい","大きな"] },
    { word:"water",   pos:"名詞",   meanings:["水","みず"] },
    { word:"eat",     pos:"動詞",   meanings:["食べる","たべる"] },
    { word:"house",   pos:"名詞",   meanings:["家","いえ","うち"] },
    { word:"red",     pos:"形容詞", meanings:["赤","赤い","あかい"] },
    { word:"friend",  pos:"名詞",   meanings:["友達","友だち","ともだち","友人"] },
    { word:"cold",    pos:"形容詞", meanings:["冷たい","つめたい","寒い","さむい"] },
    { word:"book",    pos:"名詞",   meanings:["本","ほん"] },
  ],
  elementary: [
    { word:"brave",   pos:"形容詞", meanings:["勇敢","勇敢な","ゆうかんな","勇気がある"] },
    { word:"quiet",   pos:"形容詞", meanings:["静か","静かな","しずかな"] },
    { word:"journey", pos:"名詞",   meanings:["旅","たび","旅行"] },
    { word:"laugh",   pos:"動詞",   meanings:["笑う","わらう"] },
    { word:"ocean",   pos:"名詞",   meanings:["海","うみ","大海","大洋"] },
    { word:"sharp",   pos:"形容詞", meanings:["鋭い","するどい","尖った"] },
    { word:"choose",  pos:"動詞",   meanings:["選ぶ","えらぶ","選択する"] },
    { word:"village", pos:"名詞",   meanings:["村","むら"] },
    { word:"useful",  pos:"形容詞", meanings:["便利","便利な","役立つ","有用な"] },
    { word:"proud",   pos:"形容詞", meanings:["誇り","誇りに思う","誇らしい"] },
    { word:"follow",  pos:"動詞",   meanings:["従う","したがう","ついていく"] },
    { word:"strange", pos:"形容詞", meanings:["奇妙","奇妙な","不思議な","変な"] },
  ],
  intermediate: [
    { word:"ambiguous",  pos:"形容詞", meanings:["曖昧","曖昧な","あいまいな"] },
    { word:"diligent",   pos:"形容詞", meanings:["勤勉","勤勉な","まじめな","真面目な"] },
    { word:"conceal",    pos:"動詞",   meanings:["隠す","かくす","隠蔽する"] },
    { word:"prominent",  pos:"形容詞", meanings:["著名","著名な","目立つ","有名な"] },
    { word:"persist",    pos:"動詞",   meanings:["持続する","続く","粘る","継続する"] },
    { word:"vivid",      pos:"形容詞", meanings:["鮮やか","鮮やかな","あざやかな","生き生きした"] },
    { word:"obstacle",   pos:"名詞",   meanings:["障害","障壁","妨げ","邪魔"] },
    { word:"retrieve",   pos:"動詞",   meanings:["取り戻す","回収する","取得する"] },
    { word:"enormous",   pos:"形容詞", meanings:["巨大","巨大な","膨大な","莫大な"] },
    { word:"criticize",  pos:"動詞",   meanings:["批判する","非難する","批評する"] },
    { word:"urgent",     pos:"形容詞", meanings:["緊急","緊急の","急を要する"] },
    { word:"genuine",    pos:"形容詞", meanings:["本物","本物の","真の","真実の"] },
  ],
  advanced: [
    { word:"ephemeral",  pos:"形容詞", meanings:["はかない","短命な","一時的な","儚い"] },
    { word:"pragmatic",  pos:"形容詞", meanings:["実用的","実用的な","現実的な","実践的な"] },
    { word:"eloquent",   pos:"形容詞", meanings:["雄弁","雄弁な","説得力がある"] },
    { word:"mitigate",   pos:"動詞",   meanings:["和らげる","軽減する","緩和する"] },
    { word:"paradox",    pos:"名詞",   meanings:["逆説","パラドックス","矛盾"] },
    { word:"tenacious",  pos:"形容詞", meanings:["粘り強い","頑固な","しつこい","執拗な"] },
    { word:"relinquish", pos:"動詞",   meanings:["放棄する","手放す","諦める","断念する"] },
    { word:"scrutinize", pos:"動詞",   meanings:["詳しく調べる","精査する","吟味する"] },
    { word:"affluent",   pos:"形容詞", meanings:["裕福","裕福な","豊かな","富裕な"] },
    { word:"plausible",  pos:"形容詞", meanings:["もっともらしい","ありそうな","信憑性のある"] },
    { word:"vindicate",  pos:"動詞",   meanings:["正当性を証明する","無実を証明する","弁護する"] },
    { word:"obsolete",   pos:"形容詞", meanings:["時代遅れ","時代遅れの","廃れた","旧式の"] },
  ]
};

let currentLevel = 'basic', questions = [], qIndex = 0, score = 0;
const TOTAL = 10;

function selectLevel(btn) {
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentLevel = btn.dataset.level;
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz() {
  questions = shuffle(wordBanks[currentLevel]).slice(0, TOTAL);
  qIndex = 0; score = 0;
  document.getElementById('start-screen').classList.add('hide');
  document.getElementById('quiz-screen').classList.add('show');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[qIndex];
  document.getElementById('q-word').textContent = q.word;
  document.getElementById('q-hint').textContent = '品詞: ' + q.pos;
  document.getElementById('q-counter').textContent = `問題 ${qIndex + 1} / ${TOTAL}`;
  document.getElementById('score-info').textContent = `正解 ${score}`;
  document.getElementById('progress-fill').style.width = (qIndex / TOTAL * 100) + '%';

  const input = document.getElementById('answer-input');
  input.value = ''; input.className = 'answer-input'; input.disabled = false;
  setTimeout(() => input.focus(), 100);

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('btn-answer').disabled = false;
  document.getElementById('first-char-hint').className = 'first-char-hint';

  const card = document.getElementById('question-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
}

function handleKey(e) {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('btn-answer').disabled) checkAnswer();
  else nextQuestion();
}

function showHint() {
  const hint = document.getElementById('first-char-hint');
  hint.textContent = `ヒント：最初の文字は「${questions[qIndex].meanings[0][0]}」`;
  hint.classList.add('show');
}

function normalize(s) {
  return s.trim()
    .replace(/[ぁ-ん]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60))
    .toLowerCase();
}

function checkAnswer() {
  const q = questions[qIndex];
  const input = document.getElementById('answer-input');
  const userAns = normalize(input.value);
  if (!userAns) return;

  input.disabled = true;
  document.getElementById('btn-answer').disabled = true;
  const isCorrect = q.meanings.some(m => normalize(m) === userAns);
  const fb = document.getElementById('feedback');

  if (isCorrect) {
    score++;
    input.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    document.getElementById('fb-title').textContent = '✓ 正解！';
    document.getElementById('fb-detail').textContent = `"${q.word}" は「${q.meanings[0]}」という意味です。`;
  } else {
    input.classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    document.getElementById('fb-title').textContent = '✗ 不正解…';
    document.getElementById('fb-detail').textContent = `正解は「${q.meanings[0]}」でした。`;
  }

  document.getElementById('score-info').textContent = `正解 ${score}`;
  const btnNext = document.getElementById('btn-next');
  btnNext.classList.add('show');
  btnNext.textContent = qIndex + 1 < TOTAL ? '次の問題へ →' : '結果を見る →';
}

function nextQuestion() {
  if (++qIndex >= TOTAL) showResult(); else renderQuestion();
}

function showResult() {
  document.getElementById('quiz-screen').classList.remove('show');
  document.getElementById('result-screen').classList.add('show');
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-total').textContent = `/ ${TOTAL} 問正解`;
  const pct = score / TOTAL;
  const [emoji, msg] = pct === 1 ? ['🏆','完璧！全問正解です！']
    : pct >= 0.8 ? ['🎉','素晴らしい結果です！']
    : pct >= 0.6 ? ['👍','なかなか良い調子！']
    : pct >= 0.4 ? ['📚','復習してまた挑戦しよう。']
    : ['💪','諦めずに練習しよう！'];
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-msg').textContent = msg;
}

function retryQuiz() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').classList.remove('show');
  document.getElementById('start-screen').classList.remove('hide');
}
</script>
</body>
</html>
